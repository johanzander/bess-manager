# Claude Bot — Issue Confirm / Fix + PR Reviewer
#
# TRIGGERS (only the repo owner can activate the bot):
#   @claude-bot confirm   in an issue comment → read source, confirm/deny the bug
#   @claude-bot fix this  in an issue comment → implement fix, open a draft PR
#   @claude-bot           in a PR comment     → review the PR
#
# Uses anthropics/claude-code-action@v1 (official Anthropic action).
# Claude reads CLAUDE.md for project context and per-command instructions.
#
# Pipeline:
#   Stage 1 (auto)   — issue-triage.yml   : classify and gather info
#   Stage 2 (manual) — issue-bot (confirm): confirm bug in source code
#   Stage 3 (manual) — issue-bot (fix)    : implement fix, open draft PR

name: Claude Bot

on:
  issue_comment:
    types: [created]

jobs:

  # ---------------------------------------------------------------------------
  # Issue commands: @claude-bot confirm | @claude-bot fix this
  # ---------------------------------------------------------------------------
  issue-bot:
    name: Issue Bot
    if: |
      github.event.comment.user.login == github.repository_owner &&
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEWER_PRIVATE_KEY }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude-bot"
          claude_args: "--max-turns 40"

  # ---------------------------------------------------------------------------
  # PR review: @claude-bot in a pull request comment
  # ---------------------------------------------------------------------------
  pr-bot:
    name: PR Review Bot
    if: |
      github.event.comment.user.login == github.repository_owner &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEWER_PRIVATE_KEY }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude-bot"
          claude_args: "--max-turns 30"