services:
  bess-dev:
    entrypoint: ["/bin/bash", "/mock-entrypoint.sh"]
    volumes:
      - ./backend:/app:delegated
      - ./core:/app/core:delegated
      - ./frontend/dist:/app/frontend:delegated
      - ${OPTIONS_FILE}:/data/options.json:ro
      - ./scripts/mock_ha/mock-entrypoint.sh:/mock-entrypoint.sh:ro
    environment:
      - HA_URL=http://mock-ha:8123
      - HA_TOKEN=mock_token
      - HA_TEST_MODE=false
      - HA_DB_URL=${HA_DB_URL:-http://nonexistent-influxdb:8086/api/v2/query}
      - HA_DB_BUCKET=${HA_DB_BUCKET:-homeassistant/autogen}
      - HA_DB_USER_NAME=${HA_DB_USER_NAME:-mock}
      - HA_DB_PASSWORD=${HA_DB_PASSWORD:-mock}
      - FAKETIME=${MOCK_TIME:-}
    depends_on:
      - mock-ha

  mock-ha:
    build: ./scripts/mock_ha
    ports:
      - "8123:8123"
    volumes:
      - ./scripts/mock_ha/scenarios:/scenarios:ro
    environment:
      - SCENARIO=${SCENARIO}
    networks:
      - bess-network
